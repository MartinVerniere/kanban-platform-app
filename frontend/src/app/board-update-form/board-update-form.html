<form class="board-form" (submit)="onSubmit($event)">
	<div class="form-grid">
		<div class="form-group">
			<label class="form-label" for="name"> Name </label>
			<input type="text" id="name" class="form-input" [formField]="boardForm.name" />
		</div>

		<div class="form-error">
			@if (error()) {
			<div class="error">
				<span>{{ error() }}</span>
			</div>
			}
		</div>

		<div class="form-actions">
			<button class="btn btn-primary" type="submit" [disabled]="boardForm().invalid()">
				Update board
			</button>
			<button type="button" (click)="onCancel()">Cancel</button>
		</div>
	</div>
</form>

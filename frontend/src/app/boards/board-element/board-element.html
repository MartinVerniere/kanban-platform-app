<div class="board-element">
	@if (board(); as board) {
	<div class="board-name">{{board.name}}</div>
	<button [routerLink]="['/projects', projectId(), 'boards', board.id]">Details</button>
	<button [routerLink]="['/projects', projectId(), 'boards', board.id, 'edit']">Edit</button>
	<button type="button" (click)="onBoardDeleted(board.id)">Delete</button>
	<div class="error"> {{ error() }}</div>
	}
</div>

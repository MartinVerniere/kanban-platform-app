<div class="column-list">
	@for (column of columnList(); track column.id) {
	<app-column-element [column]="column" (columnDeleted)="onRemoveColumn()"></app-column-element>
	} @empty {
	<div class="column-list-empty">No columns in this project</div>
	}
	<button [routerLink]="['/projects', projectId, 'boards', boardId, 'columns', 'create']">
		Create new column
	</button>
</div>

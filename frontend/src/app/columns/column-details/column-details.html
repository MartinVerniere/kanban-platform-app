<div class="column-details">
	@if (column.isLoading()) {
	<div class="loading">Loading...</div>
	} @else if (column.error()) {
	<div class="error">Error loading column</div>
	} @else {
	@if (column.value(); as column) {
	<div class="column-id">Id: {{column.id}}</div>
	<div class="column-name">Name: {{column.name}}</div>
	}
	}
	<button [routerLink]="['/projects', projectId, 'boards', boardId]">Go back</button>
</div>

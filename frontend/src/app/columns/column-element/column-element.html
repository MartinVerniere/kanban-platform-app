<div class="column-element">
	@if (column(); as column) {

	<div class="column-id">Id: {{column.id}}</div>
	<div class="column-name">Name: {{column.name}}</div>
	<div class="column-move-buttons">
		<button type="button" [disabled]="isFirst()" (click)="moveLeft.emit(column.id)">Move left</button>
		<button type="button" [disabled]="isLast()" (click)="moveRight.emit(column.id)">Move right</button>
	</div>
	<div class="column-buttons">
		<button
			[routerLink]="['/projects', projectId(), 'boards', boardId(), 'columns', column.id, 'edit']">Edit</button>
		<button type="button" (click)="onRemoveColumn(column.id)">Delete</button>
	</div>
	<div class="error"> {{ error() }}</div>
	}
</div>
